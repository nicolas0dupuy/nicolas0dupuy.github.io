<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveys</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        </main>
    
    <script src="script.js"></script>
    <section id="surveys">
    <form action="VOTRE_LIEN_API_FORMSPREE_OU_WEB3FORMS" method="POST" class="formulaire-statique">
        <div class="champ-formulaire">
            <label for="nom">VOTRE_LIBELLÉ_NOM</label>
            <input type="text" id="nom" name="nom" required>
        </div>
        
        <div class="champ-formulaire">
            <label for="domaine">VOTRE_LIBELLÉ_DOMAINE</label>
            <select id="domaine" name="domaine">
                <option value="option1">VOTRE_OPTION_1</option>
                <option value="option2">VOTRE_OPTION_2</option>
            </select>
        </div>
        
        <div class="champ-formulaire">
            <label for="message">VOTRE_LIBELLÉ_MESSAGE</label>
            <textarea id="message" name="message" rows="4" required></textarea>
        </div>
        
        <button type="submit" class="bouton-soumission">VOTRE_TEXTE_BOUTON</button>
    </form>
</section>
</body>
</html>
